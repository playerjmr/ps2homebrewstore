site_name: PS2 Homebrew Store
site_url: https://ps2homebrewstore.com

theme:
  name: material
  custom_dir: overrides
  language: en 
  font:
    text: Oxanium
    code: Roboto Mono
  palette: 
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
        
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: :simple-playstation2: :material-store:
  favicon: :material-store:
  features:
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - toc.follow
#    - toc.integrate
  icon:
    admonition:
      soldering: material/soldering-iron

# Content width
# extra_css:
#   - stylesheets/extra.css

plugins:
  - search
  - blog
  - glightbox

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - footnotes
  - abbr

watch:
  - includes
  
extra:
  alternate:
  # - name: English
  #   link: /en/ 
  #   lang: en
  # - name: Deutsch
  #   link: /de/
  #   lang: de
  # - name: French
  #   link: /fr/
  #   lang: fr
  # - name: Spanish
  #   link: /es/
  #   lang: es
  social:
    - icon: fontawesome/brands/discord
      name: PS2 Space on Discord
      link: https://discord.com/invite/JNEeD77R?utm_source=Discord%20Widget&utm_medium=Connect

# Page tree
nav:
  - :material-home:Home: index.md
    
  - :simple-hackaday:Exploits: 
    - exploits/index.md
    - PS2BBL: exploits/ps2bbl.md
    - Opentuna: exploits/opentuna.md
    - Supporting Folders: exploits/system.md

  - :fontawesome-solid-compact-disc:Loaders: loaders/index.md

  - :simple-retropie:Emulators: emulators/index.md

  - :material-controller:Games: games/index.md

  - :material-toolbox:Utilities: utilities/index.md

  - :material-heart-pulse:Diagnostics: diag/index.md

  - :material-hand-wave:Thanks: thanks/index.md





    